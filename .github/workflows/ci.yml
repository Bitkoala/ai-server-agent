name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: go vet
        run: go vet ./...
      - name: go fmt check
        run: test -z "$(gofmt -l .)"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        run: go test ./internal/... -v -cover -coverprofile=coverage.out
      - name: Coverage report
        run: go tool cover -func=coverage.out

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildTime=${BUILD_TIME}" \
            -o "bin/ai-server-agent-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/agent
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-server-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/ai-server-agent-linux-amd64/ai-server-agent-linux-amd64 release/ai-server-agent
          cp artifacts/ai-server-agent-linux-arm64/ai-server-agent-linux-arm64 release/ai-server-agent-arm64
          cp configs/config.yaml release/
          cp scripts/install-remote.sh release/install.sh
          cd release && tar czf ../ai-server-agent-release.tar.gz .
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ai-server-agent-release.tar.gz
            release/ai-server-agent
            release/ai-server-agent-arm64
            release/install.sh
            release/config.yaml
          generate_release_notes: true
