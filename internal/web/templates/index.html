<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Server Agent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;overflow:hidden}

/* 焦点样式 */
:focus-visible{outline:2px solid #3b82f6;outline-offset:2px;border-radius:4px}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid #3b82f6;outline-offset:2px}

/* 登录遮罩 */
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity .3s}
.login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:36px;width:380px;max-width:90%;box-shadow:0 25px 50px rgba(0,0,0,.4)}
.login-card h2{text-align:center;margin-bottom:24px;font-size:20px;font-weight:600}
.login-card input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px 14px;color:#e2e8f0;font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.login-card input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.login-card button{width:100%;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:13px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.login-card button:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.3)}
.login-card button:active{transform:translateY(0)}
.login-card .error{color:#ef4444;font-size:12px;margin-bottom:12px;text-align:center;min-height:18px}

/* 侧边栏 */
.sidebar{width:270px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:transform .3s ease}
.sidebar-header{padding:16px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:15px;font-weight:600}
.sidebar-header .user-info{font-size:11px;color:#64748b;cursor:pointer;padding:2px 8px;border-radius:4px;transition:all .2s}
.sidebar-header .user-info:hover{color:#93c5fd;background:rgba(59,130,246,.1)}
.sidebar-tabs{display:flex;border-bottom:1px solid #334155}
.sidebar-tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;cursor:pointer;color:#64748b;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.sidebar-tab:hover{color:#e2e8f0;background:rgba(255,255,255,.03)}
.sidebar-tab.active{color:#3b82f6;border-bottom-color:#3b82f6}
.sidebar-tab[aria-selected="true"]{color:#3b82f6;border-bottom-color:#3b82f6}
.sidebar-content{flex:1;overflow-y:auto;padding:12px}
.history-item,.audit-item{padding:10px 12px;margin-bottom:8px;background:#0f172a;border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.history-item:hover,.audit-item:hover{background:#1e3a5f;border-color:#334155;transform:translateX(2px)}
.history-item .time{color:#64748b;font-size:11px}
.history-item .intent{color:#93c5fd;margin:4px 0;font-weight:500}
.audit-item .action{color:#eab308}
.audit-item .result{color:#64748b;font-size:11px;margin-top:4px;word-break:break-all}

/* 手风琴设置 */
.accordion{border:1px solid #334155;border-radius:8px;margin-bottom:12px;overflow:hidden}
.accordion-header{padding:10px 14px;background:#1e293b;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:500;color:#93c5fd;transition:background .2s;user-select:none;border:none;width:100%;text-align:left}
.accordion-header:hover{background:#1e3a5f}
.accordion-header::after{content:'▾';font-size:10px;transition:transform .3s;color:#64748b}
.accordion-header.open::after{transform:rotate(180deg)}
.accordion-body{padding:0 14px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease}
.accordion-body.open{max-height:500px;padding:8px 14px 14px}
.settings-field{margin-bottom:10px}
.settings-field label{display:block;font-size:11px;color:#64748b;margin-bottom:4px}
.settings-field input,.settings-field select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px 10px;color:#e2e8f0;font-size:12px;outline:none;transition:border-color .2s}
.settings-field input:focus,.settings-field select:focus{border-color:#3b82f6}
.settings-field select option{background:#1e293b;color:#e2e8f0}
.settings-save{width:100%;background:#22c55e;color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;font-size:13px;font-weight:600;margin-top:8px;transition:all .2s}
.settings-save:hover{background:#16a34a;transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,197,94,.3)}
.settings-save:disabled{opacity:.5;transform:none}
.settings-msg{font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.settings-msg.success{color:#22c55e}
.settings-msg.error{color:#ef4444}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:900;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:24px;width:500px;max-width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.5);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:16px;margin-bottom:16px;color:#93c5fd}
.modal .close-btn{position:absolute;top:12px;right:16px;background:none;border:none;color:#64748b;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .2s}
.modal .close-btn:hover{color:#e2e8f0;background:rgba(255,255,255,.05)}
.modal-step{padding:8px 0;border-bottom:1px solid #1e293b;font-size:13px;display:flex;align-items:flex-start;gap:8px}
.modal-step:last-child{border-bottom:none}
.modal-step .step-status{flex-shrink:0;width:20px}

/* 主区域 */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
header{background:#1e293b;padding:12px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:12px}
header h1{font-size:17px;font-weight:600}
.status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chat-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.message{max-width:85%;padding:12px 16px;border-radius:14px;line-height:1.5;font-size:14px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.message.user{align-self:flex-end;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.25)}
.message.agent{align-self:flex-start;background:#1e293b;border:1px solid #334155;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.message.system{align-self:center;background:transparent;color:#64748b;font-size:12px;padding:4px 12px;animation:none}
.plan-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;margin:8px 0;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.plan-card h3{font-size:14px;margin-bottom:10px;color:#93c5fd;font-weight:600}
.step-item{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13px;border-bottom:1px solid rgba(51,65,85,.5)}
.step-item:last-child{border-bottom:none}
.risk-tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.risk-low{background:rgba(34,197,94,.15);color:#22c55e}
.risk-medium{background:rgba(234,179,8,.15);color:#eab308}
.risk-high{background:rgba(239,68,68,.15);color:#ef4444}
.confirm-bar{display:flex;gap:8px;margin-top:12px}
.confirm-bar button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.btn-confirm{background:#22c55e;color:#fff}
.btn-confirm:hover{background:#16a34a;transform:translateY(-1px)}
.btn-cancel{background:#ef4444;color:#fff}
.btn-cancel:hover{background:#dc2626;transform:translateY(-1px)}
.input-area{background:#1e293b;padding:14px 20px;border-top:1px solid #334155;display:flex;gap:12px}
.input-area input{flex:1;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px 16px;color:#e2e8f0;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
.input-area input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.input-area input::placeholder{color:#475569}
.input-area button{background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s}
.input-area button:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 12px rgba(59,130,246,.3)}
.input-area button:disabled{opacity:.5;cursor:not-allowed;transform:none}
.typing::after{content:'▊';animation:blink 1s infinite}@keyframes blink{50%{opacity:0}}
.empty-state{text-align:center;color:#64748b;padding:40px 20px;font-size:13px}

/* 移动端 */
@media(max-width:768px){
  .sidebar{display:none}
  .sidebar.open{display:flex;position:fixed;top:0;left:0;bottom:0;z-index:100;width:280px;box-shadow:4px 0 20px rgba(0,0,0,.4)}
  .login-card{padding:28px;width:340px}
}
.menu-btn{display:none;background:none;border:none;color:#e2e8f0;font-size:20px;cursor:pointer;padding:6px 10px;border-radius:6px;transition:background .2s}
.menu-btn:hover{background:rgba(255,255,255,.05)}
@media(max-width:768px){.menu-btn{display:block}}

/* 快捷操作栏 */
.quick-actions{display:flex;gap:6px;padding:8px 20px;background:#1e293b;border-top:1px solid #334155;flex-wrap:wrap}
.quick-actions button{background:#0f172a;border:1px solid #334155;color:#94a3b8;border-radius:16px;padding:6px 14px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.quick-actions button:hover{background:#1e3a5f;color:#e2e8f0;border-color:#3b82f6}
</style>
</head>
<body>

<!-- 登录遮罩 -->
<div class="login-overlay" id="loginOverlay" style="display:none" role="dialog" aria-label="登录">
  <div class="login-card">
    <h2>🤖 AI Server Agent</h2>
    <div class="error" id="loginError" role="alert"></div>
    <input type="text" id="loginUser" placeholder="用户名" aria-label="用户名" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    <input type="password" id="loginPass" placeholder="密码" aria-label="密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()" aria-label="登录按钮">登录</button>
  </div>
</div>

<!-- 初始化向导遮罩 -->
<div class="login-overlay" id="setupOverlay" style="display:none" role="dialog" aria-label="初始化设置">
  <div class="login-card">
    <h2>🔐 初次部署 - 设置管理员密码</h2>
    <div style="font-size:13px;color:#94a3b8;text-align:center;margin-bottom:16px">这是首次启动，请设置管理员账号和密码</div>
    <div class="error" id="setupError" role="alert"></div>
    <input type="text" id="setupUser" placeholder="管理员用户名 (默认: admin)" value="admin" aria-label="管理员用户名" onkeydown="if(event.key==='Enter')document.getElementById('setupPass').focus()">
    <input type="password" id="setupPass" placeholder="设置密码 (至少6位)" aria-label="管理员密码" onkeydown="if(event.key==='Enter')document.getElementById('setupPass2').focus()">
    <input type="password" id="setupPass2" placeholder="确认密码" aria-label="确认密码" onkeydown="if(event.key==='Enter')doSetup()">
    <button onclick="doSetup()">🔒 完成设置</button>
    <div style="font-size:11px;color:#64748b;text-align:center;margin-top:12px">密码将安全存储在配置文件中</div>
  </div>
</div>

<!-- 任务详情 Modal -->
<div class="modal-overlay" id="taskModal" style="display:none" onclick="if(event.target===this)closeModal()" role="dialog" aria-label="任务详情">
  <div class="modal" style="position:relative">
    <button class="close-btn" onclick="closeModal()" aria-label="关闭">✕</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<!-- 侧边栏 -->
<div class="sidebar" id="sidebar" role="navigation" aria-label="控制面板">
  <div class="sidebar-header">
    <h2>📋 控制面板</h2>
    <span class="user-info" id="userDisplay" onclick="doLogout()" title="点击登出" role="button" tabindex="0" aria-label="当前用户"></span>
  </div>
  <div class="sidebar-tabs" role="tablist">
    <button class="sidebar-tab active" role="tab" aria-selected="true" onclick="switchTab('history')">📜 历史</button>
    <button class="sidebar-tab" role="tab" aria-selected="false" onclick="switchTab('audit')">🔍 审计</button>
    <button class="sidebar-tab" role="tab" aria-selected="false" onclick="switchTab('status')">🖥️ 状态</button>
    <button class="sidebar-tab" role="tab" aria-selected="false" onclick="switchTab('settings')">⚙️ 设置</button>
  </div>
  <div class="sidebar-content" id="sidebarContent" role="tabpanel"></div>
</div>

<!-- 主区域 -->
<div class="main" role="main">
<header>
  <button class="menu-btn" onclick="toggleSidebar()" aria-label="切换侧边栏">☰</button>
  <div class="status-dot" aria-label="服务运行中"></div>
  <h1>🤖 AI Server Agent</h1>
  <span style="font-size:12px;color:#64748b">v1.0</span>
</header>
<div class="chat-container" id="chat" role="log" aria-label="对话记录" aria-live="polite"></div>
<div class="quick-actions" id="quickActions">
  <button onclick="quickSend('查看系统状态')" aria-label="快捷指令: 查看系统状态">📊 系统状态</button>
  <button onclick="quickSend('查看CPU使用率')" aria-label="快捷指令: 查看CPU使用率">💻 CPU</button>
  <button onclick="quickSend('查看内存使用')" aria-label="快捷指令: 查看内存使用">🧠 内存</button>
  <button onclick="quickSend('查看磁盘空间')" aria-label="快捷指令: 查看磁盘空间">💾 磁盘</button>
  <button onclick="quickSend('查看容器列表')" aria-label="快捷指令: 查看容器列表">📦 容器</button>
  <button onclick="quickSend('查看应用列表')" aria-label="快捷指令: 查看应用列表">📱 应用</button>
</div>
<div class="input-area">
  <input type="text" id="input" placeholder="输入自然语言指令，例如：查看CPU使用率..." aria-label="输入指令" onkeydown="if(event.key==='Enter')sendMessage()">
  <button id="sendBtn" onclick="sendMessage()" aria-label="发送消息">发送</button>
</div>
</div>

<script>
const chat=document.getElementById('chat'),input=document.getElementById('input'),sendBtn=document.getElementById('sendBtn');
let currentTab='history',authToken=null,loggedInUser=null;

// ============ 快捷操作 ============
function quickSend(msg){input.value=msg;sendMessage();input.focus()}

// ============ Modal ============
function showModal(title,body){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('taskModal').style.display='flex';
  document.addEventListener('keydown',modalEscHandler);
}
function closeModal(){
  document.getElementById('taskModal').style.display='none';
  document.removeEventListener('keydown',modalEscHandler);
}
function modalEscHandler(e){if(e.key==='Escape')closeModal()}

// ============ 认证 ============
async function checkAuth(){
  try{
    const r=await fetch('/api/auth/status');
    const d=await r.json();
    if(d.needs_setup){showSetup()}
    else if(d.enabled && !d.logged_in){showLogin()}
    else{hideLogin();hideSetup();if(d.username)loggedInUser=d.username;updateUserDisplay()}
  }catch(e){hideLogin();hideSetup()}
}

function showLogin(){document.getElementById('loginOverlay').style.display='flex';document.getElementById('loginError').textContent='';document.getElementById('setupOverlay').style.display='none';document.getElementById('loginUser').focus()}
function hideLogin(){document.getElementById('loginOverlay').style.display='none'}
function showSetup(){document.getElementById('setupOverlay').style.display='flex';document.getElementById('setupError').textContent='';document.getElementById('loginOverlay').style.display='none';document.getElementById('setupUser').focus()}
function hideSetup(){document.getElementById('setupOverlay').style.display='none'}

async function doSetup(){
  const user=document.getElementById('setupUser').value.trim()||'admin';
  const pass=document.getElementById('setupPass').value.trim();
  const pass2=document.getElementById('setupPass2').value.trim();
  const errEl=document.getElementById('setupError');
  if(!pass){errEl.textContent='请输入密码';return}
  if(pass.length<6){errEl.textContent='密码长度至少 6 位';return}
  if(pass!==pass2){errEl.textContent='两次密码不一致';return}
  errEl.textContent='';
  try{
    const r=await fetch('/api/auth/setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    const d=await r.json();
    if(!r.ok){errEl.textContent=d.error||'设置失败';return}
    authToken=d.token;loggedInUser=d.username;hideSetup();updateUserDisplay();
    addMessage('system','🎉 欢迎！管理员密码已设置完成');
  }catch(e){errEl.textContent='连接错误'}
}

async function doLogin(){
  const user=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value.trim();
  if(!user||!pass){document.getElementById('loginError').textContent='请输入用户名和密码';return}
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    const d=await r.json();
    if(!r.ok){document.getElementById('loginError').textContent=d.error||'登录失败';return}
    authToken=d.token;loggedInUser=d.username;hideLogin();updateUserDisplay();
    addMessage('system','✅ 已登录: '+loggedInUser);
  }catch(e){document.getElementById('loginError').textContent='连接错误'}
}

async function doLogout(){
  await fetch('/api/auth/logout',{method:'POST'});
  authToken=null;loggedInUser=null;updateUserDisplay();checkAuth();
}

function updateUserDisplay(){
  const el=document.getElementById('userDisplay');
  el.textContent=loggedInUser?'👤 '+loggedInUser:'';
  el.title=loggedInUser?'点击登出':'';
}

function authFetch(url,opts={}){
  opts.headers=opts.headers||{};
  if(authToken)opts.headers['Authorization']='Bearer '+authToken;
  return fetch(url,opts);
}

// ============ 侧边栏 ============
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open')}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.sidebar-tab').forEach(t=>{t.classList.remove('active');t.setAttribute('aria-selected','false')});
  const target=document.querySelector('.sidebar-tab[onclick*="'+tab+'"]');
  if(target){target.classList.add('active');target.setAttribute('aria-selected','true')}
  if(tab==='history')loadHistory();
  else if(tab==='audit')loadAudit();
  else if(tab==='status')loadStatus();
  else if(tab==='settings')loadSettings();
}

// ============ 聊天 ============
function escapeHtml(s){if(typeof s!=='string')return s;return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
function addMessage(type,content){const d=document.createElement('div');d.className='message '+type;d.setAttribute('role',type==='system'?'status':'article');d.textContent=content;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d}
function addMessageHTML(type,html){const d=document.createElement('div');d.className='message '+type;d.setAttribute('role',type==='system'?'status':'article');d.innerHTML=html;chat.appendChild(d);chat.scrollTop=chat.scrollHeight;return d}

function riskLabel(level){
  switch(level){
    case 'confirm_required':return '<span class="risk-tag risk-high" aria-label="高风险">🔴 需确认</span>';
    case 'preview':return '<span class="risk-tag risk-medium" aria-label="中风险">🟡 预览</span>';
    default:return '<span class="risk-tag risk-low" aria-label="低风险">🟢 安全</span>';
  }
}
function addPlan(task){
  let h='<div class="plan-card"><h3>📋 '+escapeHtml(task.intent)+'</h3>';
  task.steps.forEach(s=>{
    h+='<div class="step-item">'+riskLabel(s.status)+' '+escapeHtml(s.action)+(s.params&&Object.keys(s.params).length?' <span style="color:#64748b;font-size:11px">'+escapeHtml(JSON.stringify(s.params))+'</span>':'')+'</div>';
  });
  h+='</div>';return h;
}
function addConfirmBar(tid){const d=document.createElement('div');d.className='confirm-bar';d.id='confirm-'+tid;d.innerHTML='<button class="btn-confirm" onclick="confirmTask(\''+tid+'\',true)" aria-label="确认执行">✅ 确认</button><button class="btn-cancel" onclick="confirmTask(\''+tid+'\',false)" aria-label="取消操作">❌ 取消</button>';chat.appendChild(d);chat.scrollTop=chat.scrollHeight}

async function sendMessage(){
  const msg=input.value.trim();if(!msg)return;input.value='';sendBtn.disabled=true;
  addMessage('user',msg);const td=addMessageHTML('agent','<span class="typing">正在理解</span>');
  try{
    const r=await authFetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    if(r.status===401){td.innerHTML='❌ 请先登录';sendBtn.disabled=false;checkAuth();return}
    const reader=r.body.getReader();const d=new TextDecoder();let buf='',tid=null;
    while(true){const{value,done}=await reader.read();if(done)break;buf+=d.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const l of lines){if(!l.startsWith('data: '))continue;const data=JSON.parse(l.slice(6));
        switch((l.match(/event: (\w+)/)||['','message'])[1]){
          case 'thinking':td.innerHTML='⏳ '+escapeHtml(data.message);break;
          case 'plan':td.innerHTML=addPlan(data);tid=data.task_id;if(data.status==='awaiting_confirmation'||data.status==='pending')addConfirmBar(tid);loadHistory();break;
          case 'confirm_required':if(!tid)tid=data.task_id;addMessage('system','⚠️ 需要确认操作');break;
          case 'executing':addMessage('system','🚀 执行中...');break;
          case 'result':if(data.status==='done'){addMessage('agent','✅ 完成！');let rh='';data.steps.forEach(s=>{rh+=(s.status==='done'?'✅':'❌')+' '+escapeHtml(s.action)+(s.result?' → '+escapeHtml(s.result.substring(0,60)):'')+(s.error?' 错误:'+escapeHtml(s.error):'')+'<br>'});addMessageHTML('agent',rh)}else addMessage('agent','❌ 失败: '+escapeHtml(data.error||''));loadHistory();break;
          case 'error':addMessage('agent','❌ '+escapeHtml(data.error));break;
        }
      }
    }
  }catch(e){td.innerHTML='❌ 连接错误: '+escapeHtml(e.message)}
  sendBtn.disabled=false;input.focus();
}

async function confirmTask(tid,c){
  const bar=document.getElementById('confirm-'+tid);if(bar)bar.remove();
  addMessage('system',c?'✅ 已确认':'❌ 已取消');if(!c)return;
  try{
    const r=await authFetch('/api/tasks/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:tid,confirm:true})});
    const d=await r.json();
    if(d.status==='done'){addMessage('agent','✅ 完成！');let rh='';d.steps.forEach(s=>{rh+=(s.status==='done'?'✅':'❌')+' '+escapeHtml(s.action)+(s.error?' 错误:'+escapeHtml(s.error):'')+'<br>'});addMessageHTML('agent',rh)}else addMessage('agent','❌ 失败')
  }catch(e){addMessage('agent','❌ 错误: '+escapeHtml(e.message))}
}

async function loadHistory(){
  const c=document.getElementById('sidebarContent');
  try{const r=await authFetch('/api/history');const tasks=await r.json();
    if(!tasks.length){c.innerHTML='<div class="empty-state">暂无历史任务</div>';return}
    c.innerHTML=tasks.map(t=>'<div class="history-item" onclick="showTaskDetail(\''+t.id+'\')" tabindex="0" role="button" aria-label="任务: '+escapeHtml(t.intent)+'" onkeydown="if(event.key===\'Enter\')showTaskDetail(\''+t.id+'\')"><div class="time">'+new Date(t.created_at).toLocaleString('zh-CN')+'</div><div class="intent">'+(t.status==='done'?'✅':t.status==='failed'?'❌':'⏳')+' '+escapeHtml(t.intent)+'</div><div style="color:#64748b;font-size:11px">'+escapeHtml(t.user_input.substring(0,40))+'</div></div>').join('')
  }catch(e){c.innerHTML='<div class="empty-state">加载失败</div>'}
}

async function loadAudit(){
  const c=document.getElementById('sidebarContent');
  try{const r=await authFetch('/api/audit');const entries=await r.json();
    if(!entries.length){c.innerHTML='<div class="empty-state">暂无审计日志</div>';return}
    c.innerHTML=entries.slice(0,30).map(e=>'<div class="audit-item"><div class="action">'+(e.error?'❌':'✅')+' '+escapeHtml(e.action)+'</div><div class="result">'+escapeHtml((e.result||e.error||'').substring(0,60))+'</div><div style="color:#64748b;font-size:10px;margin-top:2px">'+new Date(e.created_at).toLocaleString('zh-CN')+' · '+(e.duration_ms||0)+'ms</div></div>').join('')
  }catch(e){c.innerHTML='<div class="empty-state">加载失败</div>'}
}

async function loadStatus(){
  const c=document.getElementById('sidebarContent');
  try{
    const h=await fetch('/health');const hs=await h.json();
    const t=await authFetch('/api/history');const tasks=await t.json();
    const done=tasks.filter(x=>x.status==='done').length;
    const failed=tasks.filter(x=>x.status==='failed').length;
    c.innerHTML='<div style="padding:8px"><div style="margin-bottom:12px"><strong>服务状态</strong><br><span style="color:#22c55e">● '+hs.status+'</span></div><div style="margin-bottom:12px"><strong>任务统计</strong><br>总计: '+tasks.length+'<br>成功: <span style="color:#22c55e">'+done+'</span><br>失败: <span style="color:#ef4444">'+failed+'</span></div><div><strong>操作数</strong><br>38 个操作<br>45+ 模板</div></div>'
  }catch(e){c.innerHTML='<div class="empty-state">加载失败</div>'}
}

async function showTaskDetail(tid){
  try{
    const r=await authFetch('/api/tasks?id='+tid);const t=await r.json();
    let body='<div style="margin-bottom:12px;color:#64748b;font-size:12px">状态: <span style="color:'+(t.status==='done'?'#22c55e':t.status==='failed'?'#ef4444':'#eab308')+'">'+t.status+'</span> · '+new Date(t.created_at).toLocaleString('zh-CN')+'</div>';
    body+='<div style="margin-bottom:8px;color:#94a3b8;font-size:12px">输入: '+escapeHtml(t.user_input)+'</div>';
    t.steps.forEach(s=>{
      body+='<div class="modal-step"><span class="step-status">'+(s.status==='done'?'✅':s.status==='failed'?'❌':'⏳')+'</span><div><strong>'+escapeHtml(s.action)+'</strong>'+(s.result?'<br><span style="color:#64748b;font-size:11px">'+escapeHtml(s.result.substring(0,100))+'</span>':'')+(s.error?'<br><span style="color:#ef4444;font-size:11px">错误: '+escapeHtml(s.error)+'</span>':'')+'</div></div>';
    });
    showModal('任务详情: '+t.intent,body||'无步骤');
  }catch(e){addMessage('system','加载详情失败')}
}

// ============ 设置面板 (手风琴) ============
async function loadSettings(){
  const c=document.getElementById('sidebarContent');
  try{
    const r=await authFetch('/api/settings');
    const cfg=await r.json();
    c.innerHTML=buildSettingsHTML(cfg);
    // 绑定手风琴事件
    c.querySelectorAll('.accordion-header').forEach(h=>{
      h.addEventListener('click',function(){
        this.classList.toggle('open');
        this.nextElementSibling.classList.toggle('open');
      });
      // 键盘支持
      h.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();this.click()}});
    });
  }catch(e){c.innerHTML='<div class="empty-state">加载设置失败: '+escapeHtml(e.message)+'</div>'}
}

function buildSettingsHTML(cfg){
  const llm=cfg.llm||{},onepanel=cfg.onepanel||{},notify=cfg.notify||{},security=cfg.security||{};
  return '<div style="padding:4px">'+
    accSection('🤖 LLM 配置',true,
      field('llm_provider','提供商',llm.provider||'openai','select','openai,ollama')+
      field('llm_api_key','API 密钥',llm.api_key||'','password')+
      field('llm_base_url','API 地址',llm.base_url||'https://api.openai.com/v1')+
      field('llm_model','模型',llm.model||'gpt-4o-mini')
    )+
    accSection('🔌 1Panel 连接',false,
      field('onepanel_base_url','1Panel 地址',onepanel.base_url||'http://localhost:9999')+
      field('onepanel_api_key','1Panel API 密钥',onepanel.api_key||'','password')
    )+
    accSection('📢 通知渠道',false,
      field('notify_feishu','飞书 Webhook',notify.feishu_webhook||'')+
      field('notify_dingtalk','钉钉 Webhook',notify.dingtalk_webhook||'')+
      field('notify_wecom','企业微信 Webhook',notify.wecom_webhook||'')+
      field('notify_telegram_bot_token','Telegram Bot Token',notify.telegram_bot_token||'','password')+
      field('notify_telegram_chat_id','Telegram Chat ID',notify.telegram_chat_id||'')+
      field('notify_min_level','最低通知级别',notify.min_level||'warning','select','info,warning,error')
    )+
    accSection('🛡️ 安全',false,
      field('security_require_confirm','危险操作需确认',security.dangerous_ops_require_confirm!==undefined?String(security.dangerous_ops_require_confirm):'true','select','true,false')+
      field('security_rate_limit','频率限制(次/分钟)',security.rate_limit_per_minute||'30')
    )+
    '<div id="settingsMsg" class="settings-msg"></div>'+
    '<button class="settings-save" onclick="saveSettings()">💾 保存设置</button>'+
    '<div style="font-size:11px;color:#64748b;text-align:center;margin-top:8px">保存后需重启服务生效</div>'+
    '</div>';
}

function accSection(title,open,content){
  return '<div class="accordion"><button class="accordion-header'+(open?' open':'')+'" type="button" aria-expanded="'+(open?'true':'false')+'" tabindex="0">'+title+'</button><div class="accordion-body'+(open?' open':'')+'">'+content+'</div></div>';
}

function field(name,label,value,type,extra){
  if(type==='select'){
    const opts=extra.split(',').map(o=>'<option value="'+o+'"'+(value===o?' selected':'')+'>'+o+'</option>').join('');
    return '<div class="settings-field"><label for="f_'+name+'">'+label+'</label><select id="f_'+name+'">'+opts+'</select></div>';
  }
  return '<div class="settings-field"><label for="f_'+name+'">'+label+'</label><input type="'+(type||'text')+'" id="f_'+name+'" value="'+escapeHtml(String(value))+'"></div>';
}

async function saveSettings(){
  const msg=document.getElementById('settingsMsg');
  msg.textContent='保存中...';msg.className='settings-msg';
  const updates={
    llm:{provider:getVal('llm_provider'),api_key:getVal('llm_api_key'),base_url:getVal('llm_base_url'),model:getVal('llm_model')},
    onepanel:{base_url:getVal('onepanel_base_url'),api_key:getVal('onepanel_api_key')},
    notify:{feishu_webhook:getVal('notify_feishu'),dingtalk_webhook:getVal('notify_dingtalk'),wecom_webhook:getVal('notify_wecom'),telegram_bot_token:getVal('notify_telegram_bot_token'),telegram_chat_id:getVal('notify_telegram_chat_id'),min_level:getVal('notify_min_level')},
    security:{dangerous_ops_require_confirm:getVal('security_require_confirm')==='true',rate_limit_per_minute:parseInt(getVal('security_rate_limit'))||30}
  };
  try{
    const r=await authFetch('/api/settings',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
    const d=await r.json();
    if(r.ok){msg.textContent='✅ '+d.message;msg.className='settings-msg success'}
    else{msg.textContent='❌ '+d.error;msg.className='settings-msg error'}
  }catch(e){msg.textContent='❌ 保存失败';msg.className='settings-msg error'}
}

function getVal(id){return document.getElementById('f_'+id)?.value||''}
